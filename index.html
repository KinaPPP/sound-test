<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sound Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%; height: 100%;
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Georgia', serif;
        }

        .layout {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
        }

        /* ヘッダー */
        .header {
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            flex-shrink: 0;
        }
        .header-title {
            font-size: 11px;
            letter-spacing: 0.35em;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
        }

        /* キャンバスエリア */
        .canvases {
            flex: 1;
            display: flex;
            gap: 2px;
            min-height: 0;
        }

        .panel {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            touch-action: none;
        }

        /* パネルラベル */
        .panel-label {
            position: absolute;
            top: 12px;
            left: 0; right: 0;
            text-align: center;
            font-size: 11px;
            letter-spacing: 0.25em;
            pointer-events: none;
            transition: opacity 0.8s;
        }
        #label-shizuku { color: rgba(220,240,255,0.4); }
        #label-ryuka   { color: rgba(255,230,150,0.4); }

        /* tap hint */
        .hint {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 11px;
            letter-spacing: 0.2em;
            pointer-events: none;
            transition: opacity 1s;
            text-align: center;
        }
        #hint-shizuku { color: rgba(220,240,255,0.3); }
        #hint-ryuka   { color: rgba(255,255,255,0.3); }

        /* フッター */
        .footer {
            height: 64px;
            background: #0a0a0a;
            border-top: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-shrink: 0;
            flex-wrap: wrap;
            padding: 0 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            padding: 7px 14px;
            border-radius: 2px;
            font-size: 11px;
            letter-spacing: 0.08em;
            text-decoration: none;
            transition: all 0.2s;
            white-space: nowrap;
            border: 1px solid;
        }

        .btn-shizuku {
            background: rgba(0,51,85,0.4);
            border-color: rgba(119,204,255,0.4);
            color: rgba(220,240,255,0.85);
        }
        .btn-shizuku:hover {
            background: rgba(0,51,85,0.7);
            border-color: rgba(119,204,255,0.8);
        }

        .btn-ryuka {
            background: rgba(180,0,0,0.35);
            border-color: rgba(255,204,0,0.4);
            color: rgba(255,240,180,0.85);
        }
        .btn-ryuka:hover {
            background: rgba(180,0,0,0.6);
            border-color: rgba(255,204,0,0.8);
        }

        .divider {
            width: 1px;
            height: 20px;
            background: rgba(255,255,255,0.1);
            margin: 0 4px;
        }

        .btn-gh {
            background: transparent;
            border-color: rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.3);
            font-size: 10px;
            padding: 7px 10px;
        }
        .btn-gh:hover {
            border-color: rgba(255,255,255,0.3);
            color: rgba(255,255,255,0.6);
        }
    </style>
</head>
<body>
<div class="layout">
    <div class="header">
        <span class="header-title">Sound Test — KINA</span>
    </div>

    <div class="canvases">
        <!-- Shi-Zu-Ku -->
        <div class="panel" id="panel-shizuku">
            <canvas id="c-shizuku"></canvas>
            <div class="panel-label" id="label-shizuku">Shi-Zu-Ku</div>
            <div class="hint" id="hint-shizuku">tap</div>
        </div>

        <!-- Ryu-Ka -->
        <div class="panel" id="panel-ryuka">
            <canvas id="c-ryuka"></canvas>
            <div class="panel-label" id="label-ryuka">Ryu-Ka</div>
            <div class="hint" id="hint-ryuka">tap</div>
        </div>
    </div>

    <div class="footer">
        <a class="btn btn-shizuku" href="https://kinappp.github.io/shi-zu-ku/" target="_blank">▶ Shi-Zu-Ku</a>
        <a class="btn btn-gh" href="https://github.com/KinaPPP/shi-zu-ku" target="_blank">GitHub</a>
        <div class="divider"></div>
        <a class="btn btn-ryuka" href="https://kinappp.github.io/ryu-ka/" target="_blank">▶ Ryu-Ka</a>
        <a class="btn btn-gh" href="https://github.com/KinaPPP/ryu-ka" target="_blank">GitHub</a>
    </div>
</div>

<script>
// ==========================================
// Shi-Zu-Ku エンジン
// ==========================================
const csz = document.getElementById('c-shizuku');
const cszCtx = csz.getContext('2d');
const FULL_SCALE = [36,38,40,43,45,48,50,52,55,57,60,62,64,67,69,72,74,76,79,81];
const RS = 0.5;

const masterLimiter = new Tone.Limiter(-6).toDestination();

const szHigh = new Tone.PolySynth(Tone.Synth, {
    maxPolyphony:8, oscillator:{type:'triangle'},
    envelope:{attack:0.05,release:1.5}
}).connect(masterLimiter);
const szLow = new Tone.PolySynth(Tone.Synth, {
    maxPolyphony:16, oscillator:{type:'sine'},
    envelope:{attack:0.04,release:1.2}
}).connect(masterLimiter);
szHigh.volume.value = -22;
szLow.volume.value  = -6;

// ==========================================
// Ryu-Ka エンジン
// ==========================================
const crk = document.getElementById('c-ryuka');
const crkCtx = crk.getContext('2d');
const RYUKYU_SCALE = [48,52,53,55,59,60,64,65,67,71,72,76,77,79,83,84,84,84,84,84];

const rkHigh = new Tone.PolySynth(Tone.Synth, {
    maxPolyphony:8, oscillator:{type:'triangle'},
    envelope:{attack:0.01,decay:0.2,sustain:0.1,release:1.5}
}).connect(masterLimiter);
const rkLow = new Tone.PolySynth(Tone.Synth, {
    maxPolyphony:16, oscillator:{type:'square'},
    envelope:{attack:0.015,decay:0.3,sustain:0.05,release:1.0}
}).connect(masterLimiter);
rkHigh.volume.value = -18;
rkLow.volume.value  = -14;

// ==========================================
// リサイズ
// ==========================================
function resize() {
    const panelSz = document.getElementById('panel-shizuku');
    const panelRk = document.getElementById('panel-ryuka');
    csz.width  = panelSz.clientWidth  * RS;
    csz.height = panelSz.clientHeight * RS;
    crk.width  = panelRk.clientWidth  * RS;
    crk.height = panelRk.clientHeight * RS;
}
window.addEventListener('resize', resize);
resize();

// ==========================================
// 波紋クラス（汎用）
// ==========================================
class Ripple {
    constructor(x, y, notes, w, h, low, high, waveColor) {
        this.x=x; this.y=y; this.r=0;
        this.speed=(1.5+(x/w))*RS;
        this.hitFlags=[false,false,false,false];
        this.hitCount=0; this.myNotes=notes;
        this.w=w; this.h=h;
        this.low=low; this.high=high;
        this.waveColor=waveColor;
    }
    update() {
        this.r += this.speed;
        const walls=[this.y,this.h-this.y,this.x,this.w-this.x];
        for(let i=0;i<4;i++){
            if(this.r>=walls[i]&&!this.hitFlags[i]){
                if(this.hitCount<4){
                    const midi=this.myNotes[this.hitCount];
                    this.low.triggerAttackRelease(Tone.Frequency(midi,'midi'),'16n');
                    if(this.hitCount===0)
                        this.high.triggerAttackRelease(Tone.Frequency(midi+12,'midi'),'16n');
                    this.hitCount++;
                }
                this.hitFlags[i]=true;
            }
        }
    }
    draw(ctx) {
        const maxR=Math.sqrt(this.w**2+this.h**2);
        const alpha=Math.max(0,1-this.r/maxR);
        ctx.strokeStyle=this.waveColor.replace('A',alpha);
        ctx.lineWidth=1.2;
        ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.stroke();
    }
    isDead(){ return this.hitFlags.every(f=>f)&&this.r>Math.max(this.w,this.h); }
}

let szRipples=[], rkRipples=[];
let audioStarted=false;
const hintSz = document.getElementById('hint-shizuku');
const hintRk = document.getElementById('hint-ryuka');

async function ensureAudio(){
    if(!audioStarted){ await Tone.start(); audioStarted=true; }
}

function spawnSz(x,y){
    if(szRipples.length>20) szRipples.shift();
    const yRatio=1-(y/csz.height);
    const si=Math.floor(yRatio*(FULL_SCALE.length-5));
    const notes=FULL_SCALE.slice(si,si+5);
    szLow.triggerAttackRelease(Tone.Frequency(notes[0],'midi'),'16n');
    szHigh.triggerAttackRelease(Tone.Frequency(notes[0]+12,'midi'),'16n');
    szRipples.push(new Ripple(x,y,notes.slice(1),csz.width,csz.height,szLow,szHigh,'rgba(220,240,255,A)'));
    hintSz.style.opacity='0';
}

function spawnRk(x,y){
    if(rkRipples.length>20) rkRipples.shift();
    const yRatio=1-(y/crk.height);
    const si=Math.floor(yRatio*(RYUKYU_SCALE.length-5));
    const notes=RYUKYU_SCALE.slice(si,si+5);
    rkLow.triggerAttackRelease(Tone.Frequency(notes[0],'midi'),'16n');
    rkHigh.triggerAttackRelease(Tone.Frequency(notes[0]+12,'midi'),'16n');
    rkRipples.push(new Ripple(x,y,notes.slice(1),crk.width,crk.height,rkLow,rkHigh,'rgba(255,255,255,A)'));
    hintRk.style.opacity='0';
}

// ==========================================
// ポインターイベント（各パネルへ）
// ==========================================
csz.addEventListener('pointerdown', async(e)=>{
    await ensureAudio();
    const rect=csz.getBoundingClientRect();
    spawnSz((e.clientX-rect.left)*RS*csz.width/rect.width,
            (e.clientY-rect.top )*RS*csz.height/rect.height);
});
crk.addEventListener('pointerdown', async(e)=>{
    await ensureAudio();
    const rect=crk.getBoundingClientRect();
    spawnRk((e.clientX-rect.left)*RS*crk.width/rect.width,
            (e.clientY-rect.top )*RS*crk.height/rect.height);
});
csz.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});
crk.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});

// ==========================================
// ガイドサークル
// ==========================================
function drawGuide(ctx, time, color, started) {
    if(started) return;
    if(time<2000) return;
    const ct=(time-2000)%12000;
    if(ct>5000) return;
    let a=0,sh=0;
    const w=ctx.canvas.width, h=ctx.canvas.height;
    if(ct<1000) a=ct/1000;
    else if(ct<3500){ a=1; const t=ct-1000; sh=(1-Math.cos(t/1250*Math.PI*2))*0.5; }
    else a=1-(ct-3500)/1500;
    const r=Math.max(15,Math.min(w,h)*0.08)*(1-sh*0.15);
    ctx.strokeStyle=color.replace('AA',a*0.5);
    ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(w/2,h/2,Math.max(0.1,r),0,Math.PI*2); ctx.stroke();
    ctx.fillStyle=color.replace('AA',a*0.15);
    ctx.beginPath(); ctx.arc(w/2,h/2,Math.max(0.1,r*0.6),0,Math.PI*2); ctx.fill();
}

// ==========================================
// メインループ
// ==========================================
function loop(time){
    if(!time) time=performance.now();

    // Shi-Zu-Ku
    const g1=cszCtx.createLinearGradient(0,csz.height,csz.width,0);
    g1.addColorStop(0,'#000c1a'); g1.addColorStop(0.15,'#003355');
    g1.addColorStop(0.35,'#3388bb'); g1.addColorStop(1,'#77ccff');
    cszCtx.fillStyle=g1; cszCtx.fillRect(0,0,csz.width,csz.height);
    for(let i=szRipples.length-1;i>=0;i--){
        szRipples[i].update(); szRipples[i].draw(cszCtx);
        if(szRipples[i].isDead()) szRipples.splice(i,1);
    }
    drawGuide(cszCtx,time,'rgba(220,240,255,AA)',szRipples.length>0||audioStarted&&szRipples.length===0&&hintSz.style.opacity==='0');

    // Ryu-Ka
    const g2=crkCtx.createLinearGradient(0,crk.height,crk.width,0);
    g2.addColorStop(0,'#cc0000'); g2.addColorStop(0.3,'#e63946');
    g2.addColorStop(0.35,'#f4d03f'); g2.addColorStop(1,'#ffcc00');
    crkCtx.fillStyle=g2; crkCtx.fillRect(0,0,crk.width,crk.height);
    for(let i=rkRipples.length-1;i>=0;i--){
        rkRipples[i].update(); rkRipples[i].draw(crkCtx);
        if(rkRipples[i].isDead()) rkRipples.splice(i,1);
    }
    drawGuide(crkCtx,time,'rgba(255,255,255,AA)',rkRipples.length>0||audioStarted&&rkRipples.length===0&&hintRk.style.opacity==='0');

    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
